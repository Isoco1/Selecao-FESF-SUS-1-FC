version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
#  docker-compose up --build
#  Frontend: http://localhost:3000
#  Backend:  http://localhost:8000
#  Swagger:  http://localhost:8000/docs
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── API FastAPI ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hospital_backend
    ports:
      - "8000:8000"
    volumes:
      # Persiste o banco SQLite entre reinicializações do container
      - hospital_db:/app
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # URLs acessadas PELO NAVEGADOR do usuário (não pelo container)
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
    container_name: hospital_frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  # Volume nomeado para persistência do banco de dados
  hospital_db:
